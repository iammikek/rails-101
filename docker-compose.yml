services:
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "8012:8000"
    environment:
      RAILS_ENV: production
      SECRET_KEY_BASE: docker-secret-key-base-for-rails-101-learning-only
      JWT_SECRET: docker-jwt-secret-for-rails-101-dev
      DATABASE_URL: postgres://app:app@database:5432/app
      RAILS_LOG_TO_STDOUT: "true"
      RAILS_SERVE_STATIC_FILES: "true"

volumes:
  postgres_data:
